# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@8575951200e472d5f2d95c625da0c7bec8217c42 # v1.161.0
        with:
          ruby-version: "3.1" # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Update Jekyll Welcome Post Date
        run: |
          sed -i "s/<%= Time.now.strftime('%Y-%m-%d %H:%M:%S %z') %>/$(date '+%Y-%m-%d %H:%M:%S %z')/" vendor/bundle/ruby/3.1.0/gems/jekyll-3.9.3/lib/site_template/_posts/0000-00-00-welcome-to-jekyll.markdown.erb
      - name: Exclude problematic files
        run: |
          mv vendor/bundle/ruby/3.1.0/gems/liquid-4.0.4/lib/liquid/locales/en.yml vendor/bundle/ruby/3.1.0/gems/liquid-4.0.4/lib/liquid/locales/en.yml.bak
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build"
        env:
          JEKYLL_ENV: production
      - name: Restore excluded files
        run: |
          mv vendor/bundle/ruby/3.1.0/gems/liquid-4.0.4/lib/liquid/locales/en.yml.bak vendor/bundle/ruby/3.1.0/gems/liquid-4.0.4/lib/liquid/locales/en.yml
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
